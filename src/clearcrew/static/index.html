<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClearCrew — Trust Layer for Autonomous Payouts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Verasettle console skin — light-only, per brand. All text tones ≥4.5:1. */
    color-scheme: light;
    --bg: #f7f6f2; --panel: #ffffff; --card: #efede6; --line: #e0ded4;
    --ink: #17211c; --muted: #4d5560; --dim: #667080;
    --teal: #0d9488; --teal-soft: rgba(13,148,136,.10);
    /* white text on --teal measures 3.74:1 (fails AA); filled buttons use this
       darker shade instead so their labels clear 4.5:1. */
    --teal-strong: #0b766b;
    --violet: #6d28d9; --violet-soft: rgba(109,40,217,.09);
    --purple: #7e22ce; --purple-soft: rgba(126,34,206,.09);
    --green: #047857; --green-soft: rgba(5,150,105,.10);
    --red: #b91c1c; --red-soft: rgba(185,28,28,.08);
    --gold: #92400e; --gold-soft: rgba(180,83,9,.10);
    --blue: #1d4ed8; --blue-soft: rgba(29,78,216,.08);
    --t-fast: 150ms cubic-bezier(.22,1,.36,1);
    --t-med: 220ms cubic-bezier(.22,1,.36,1);
  }
  * { box-sizing: border-box; margin: 0; }
  * { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }
  ::-webkit-scrollbar-track { background: transparent; }
  body {
    background: var(--bg); color: var(--ink); min-height: 100vh;
    font: 15px/1.55 "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    display: grid; grid-template-columns: 232px 1fr;
  }
  code, .mono { font-family: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  .amt, .pos, .toff, .stat b, .statebar .t, .cfchg, .num { font-variant-numeric: tabular-nums; }
  :focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 4px; }
  a { color: var(--blue); text-decoration: none; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: .01ms !important; animation: none !important; }
  }

  /* ---- sidebar ---- */
  .side { border-right: 1px solid var(--line); padding: 18px 14px; position: sticky;
    top: 0; height: 100vh; overflow-y: auto; }
  .side .wm { font-size: 18px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 3px; line-height: 1.25; }
  .side .wm b { color: var(--teal); }
  .side .wmsub { color: var(--dim); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 20px; }
  .navlink { display: flex; align-items: center; gap: 9px; padding: 8px 12px; border-radius: 6px; color: var(--muted);
    text-decoration: none; font-size: 13.5px; margin-bottom: 2px;
    transition: background var(--t-fast), color var(--t-fast); }
  .navlink svg { flex: none; opacity: .75; transition: opacity var(--t-fast); }
  .navlink[aria-current="page"] { background: var(--panel); color: var(--teal); border: 1px solid var(--line); font-weight: 600; }
  .navlink[aria-current="page"] svg { opacity: 1; }
  @media (hover:hover){ .navlink:hover { color: var(--ink); } .navlink:hover svg { opacity: 1; } }
  .side .navgap { height: 14px; }
  #liveBtn {
    width: 100%; display: flex; align-items: center; gap: 9px; text-align: left;
    background: var(--card); color: var(--gold);
    border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px;
    font: inherit; font-size: 13px; cursor: pointer; margin-top: 4px;
    transition: border-color var(--t-fast), transform 160ms cubic-bezier(.23,1,.32,1);
  }
  #liveBtn svg { flex: none; }
  #liveBtn:active:not(:disabled) { transform: scale(.98); }
  #liveBtn:disabled { opacity: .55; cursor: default; }
  @media (hover: hover) and (pointer: fine) { #liveBtn:hover:not(:disabled) { border-color: var(--gold); } }
  #liveBtn.running:disabled { opacity: 1; animation: livePulse 1.6s ease-in-out infinite; }
  @keyframes livePulse { 50% { opacity: .55; } }

  /* structural collapse, not fluid shrink: below ~880px the 232px rail eats too
     much width (and the trustbar orphan-wraps), so the sidebar becomes a
     horizontally-scrolling top bar and the wordmark subtitle drops. */
  @media (max-width: 880px) {
    body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .side { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 4px 6px; flex-wrap: nowrap; overflow-x: auto;
      padding: 10px 14px; }
    .side .wm { margin: 0 10px 0 0; white-space: nowrap; }
    .side .wmsub, .side .navgap { display: none; }
    .navlink { margin-bottom: 0; white-space: nowrap; flex: none; }
    #liveBtn { width: auto; white-space: nowrap; margin-top: 0; flex: none; margin-left: 4px; }
  }

  /* ---- main column ---- */
  .col { min-width: 0; display: flex; flex-direction: column; }
  .trustbar { position: sticky; top: 0; z-index: 3; background: var(--panel);
    border-bottom: 1px solid var(--line); color: var(--dim); font-size: 11.5px;
    letter-spacing: .04em; padding: 7px 24px; display: flex; gap: 18px; flex-wrap: wrap; }
  .trustbar b { color: var(--green); font-weight: 700; }
  .stage { padding: 22px 28px 64px; overflow-y: auto; }
  /* the summary pages (everything but Operations, which needs its full width
     for the 3-panel hero) are short — capping their measure keeps them
     reading as a designed page instead of content stranded in a corner. */
  #view-overview, #view-policies, #view-evidence, #view-failures, #view-analytics { max-width: 1040px; }
  .vhead { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
  .vhead h1 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
  .vhead .sub { color: var(--muted); font-size: 13px; }
  .loading { color: var(--dim); padding: 40px 4px; font-size: 13px; }
  .err { margin: 14px 0; padding: 12px 16px; border-radius: 8px; font-size: 13px;
    background: var(--red-soft); border: 1px solid var(--red); color: var(--red); }
  .err button { margin-left: 10px; background: transparent; color: var(--red);
    border: 1px solid var(--red); border-radius: 6px; padding: 3px 10px;
    font: inherit; font-size: 12px; cursor: pointer; }
  select.runsel {
    background: var(--card); color: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; padding: 7px 10px; font: inherit; font-size: 13px;
  }

  /* ---- stat tiles ---- */
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin: 28px 0 8px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 14px 18px; font-size: 11.5px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em; }
  .stat b { display: block; color: var(--ink); font-size: 34px; font-weight: 700;
    margin-bottom: 4px; letter-spacing: -.02em; text-transform: none; }
  .stat b.text { font-size: 15px; font-weight: 600; letter-spacing: 0; white-space: nowrap; }
  .stat.win b { color: var(--green); }
  .stat.chain-ok b { color: var(--green); }

  /* ---- chips ---- */
  .chip { font-size: 10.5px; font-weight: 600; letter-spacing: .04em; padding: 2.5px 8px;
    border-radius: 5px; text-transform: uppercase; display: inline-block; }
  .chip.approved { background: var(--green-soft); color: var(--green); }
  .chip.rejected { background: var(--red-soft); color: var(--red); }
  .chip.disputed, .chip.escalated { background: var(--gold-soft); color: var(--gold); }
  .chip.settled { background: var(--green-soft); color: var(--green); outline: 1px solid var(--green); }
  .chip.pending { background: var(--card); color: var(--dim); }
  .chip.miss { background: var(--red-soft); color: var(--red); outline: 1px solid var(--red); }

  /* ---- generic table ---- */
  table.grid { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 6px; }
  table.grid th { text-align: left; color: var(--dim); font-size: 10.5px; text-transform: uppercase;
    letter-spacing: .08em; font-weight: 600; padding: 6px 10px; border-bottom: 1px solid var(--line); }
  table.grid td { padding: 8px 10px; border-bottom: 1px solid var(--line); }
  table.grid tr.clickable { cursor: pointer; }
  @media (hover:hover){ table.grid tr.clickable:hover td { background: var(--panel); } }
  .linklike { color: var(--blue); cursor: pointer; }

  /* ---- overview recent / activity ---- */
  .rowlink { cursor: pointer; }

  /* ---- panels / detail ---- */
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; }
  .panel h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); margin-bottom: 10px; }
  .panel.exec b.ok { color: var(--green); }
  .muted-note { color: var(--dim); font-size: 12px; margin-top: 8px; }
  .kvline { display: flex; justify-content: space-between; gap: 12px; padding: 5px 0; font-size: 13px;
    border-top: 1px solid var(--line); }
  .kvline:first-of-type { border-top: none; } .kvline .k { color: var(--dim); }
  /* separates "what was submitted" from "what happened to it" — two different
     questions the panel answers, so they read as two groups, not one list. */
  .kvline.kvbreak { margin-top: 10px; padding-top: 15px; border-top: 1px solid var(--ink); border-top-color: color-mix(in srgb, var(--ink) 12%, transparent); }

  .truststrip { display: flex; gap: 18px; flex-wrap: wrap; margin: 4px 0 14px; font-size: 13px; color: var(--muted); }
  .truststrip span { white-space: nowrap; }
  .truststrip .tc.ok { color: var(--green); font-weight: 700; }
  .truststrip .tc.no { color: var(--dim); font-weight: 700; }

  /* Decision / Replay / Execution used to sit side by side as a 3-column
     grid that only reached 3-up past ~1550px of window width — everyone on
     a normal laptop got a stacked pile of three full panels instead. Tabs
     show one at a time, so the layout is identical (and considered) at
     every width instead of degrading to a jammed stack below a container
     query threshold nobody hit in practice. */
  .tabbar { display: flex; gap: 22px; border-bottom: 1px solid var(--line); margin: 0 0 18px; }
  .tabbtn { background: transparent; border: none; border-bottom: 2px solid transparent;
    padding: 9px 1px 10px; font: inherit; font-size: 13.5px; font-weight: 600; color: var(--dim);
    cursor: pointer; transition: color var(--t-fast), border-color var(--t-fast); }
  .tabbtn[aria-selected="true"] { color: var(--teal); border-bottom-color: var(--teal); }
  @media (hover: hover) { .tabbtn:hover:not([aria-selected="true"]) { color: var(--ink); } }
  .tabpanel[hidden] { display: none; }

  .payout-head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
  .payout-head h2 { font-size: 38px; font-weight: 700; letter-spacing: -.03em; }

  /* ---- ops list ---- */
  .opsgrid { display: grid; grid-template-columns: 360px 1fr; gap: 0; }
  @media (max-width: 1000px){ .opsgrid { grid-template-columns: 1fr; } }
  #opsList { border-right: 1px solid var(--line); padding: 8px 12px 40px; max-height: calc(100vh - 200px); overflow-y: auto; }
  #opsList h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); padding: 4px 10px 10px; }
  .payout { display: grid; grid-template-columns: 1fr auto; gap: 2px 10px; cursor: pointer;
    padding: 10px 12px; border-radius: 7px; border: 1px solid transparent; margin-bottom: 4px;
    transition: background var(--t-fast), border-color var(--t-fast); }
  @media (hover: hover) and (pointer: fine) { .payout:hover { background: var(--panel); } }
  .payout.active { background: var(--panel); border-color: var(--teal); box-shadow: 0 1px 3px rgba(23,33,28,.06); }
  .payout .amt { font-weight: 600; font-size: 14.5px; white-space: nowrap; }
  .payout .meta { color: var(--muted); font-size: 11.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .payout .meta.mono { white-space: normal; overflow: visible; text-overflow: clip; line-height: 1.4; }
  .chips { display: flex; gap: 5px; align-items: center; justify-content: flex-end; grid-row: span 2; align-self: center; flex-wrap: wrap; }
  #opsDetail { padding: 14px 22px 60px; overflow-y: auto; max-height: calc(100vh - 200px); }
  #opsDetail .placeholder { color: var(--muted); padding: 56px 0; font-size: 14px; max-width: 52ch; }

  /* ---- replay controls / timeline (ported) ---- */
  .controls { display: flex; gap: 8px; align-items: center; margin: 12px 0 18px; flex-wrap: wrap; }
  .controls button { background: var(--card); color: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; padding: 7px 16px; font: inherit; font-size: 13px; cursor: pointer;
    transition: border-color var(--t-fast), opacity var(--t-fast), transform 160ms cubic-bezier(.23,1,.32,1); }
  @media (hover: hover) and (pointer: fine) { .controls button:hover:not(:disabled) { border-color: var(--teal); } }
  .controls button:active:not(:disabled) { transform: scale(.97); }
  .controls button:disabled { opacity: .45; cursor: default; }
  .controls button.primary { background: var(--teal-strong); border-color: var(--teal-strong); color: #fff; font-weight: 600; }
  .controls #play { min-width: 86px; }
  .controls .pos { color: var(--dim); font-size: 12.5px; margin-left: 6px; }
  .controls .hint { color: var(--dim); font-size: 11.5px; margin-left: auto; }

  .statebar { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; gap: 10px; margin: 0 0 18px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px 16px; font-size: 13.5px;
    box-shadow: 0 2px 8px rgba(23,33,28,.05); transition: background 200ms ease, border-color 200ms ease; }
  .statebar.ok { background: #e6f4f0; border-color: var(--green); }
  .statebar.ok.pulse { animation: settled-pulse 700ms cubic-bezier(.23,1,.32,1) 1; }
  .statebar.bad { background: #f9eded; border-color: var(--red); }
  @keyframes settled-pulse {
    from { box-shadow: 0 2px 8px rgba(23,33,28,.05), 0 0 0 0 rgba(5,150,105,.35); }
    to   { box-shadow: 0 2px 8px rgba(23,33,28,.05), 0 0 0 16px rgba(5,150,105,0); }
  }
  .statebar .k { color: var(--dim); font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; }
  .statebar .v { font-weight: 600; transform-origin: left center; transition: color 200ms ease, transform 200ms cubic-bezier(.23,1,.32,1); }
  .statebar.ok .v, .statebar.bad .v { transform: scale(1.12); letter-spacing: .02em; }
  .statebar .t { margin-left: auto; color: var(--dim); font-size: 12px; }

  .asserts { margin-top: 18px; padding: 14px 18px; border-radius: 8px; background: var(--green-soft);
    border: 1px solid var(--green); font-size: 13.5px; color: var(--green);
    visibility: hidden; opacity: 0; transform: translateY(4px);
    transition: opacity var(--t-fast), transform var(--t-fast), visibility var(--t-fast); }
  .asserts.show { visibility: visible; opacity: 1; transform: none;
    transition: opacity var(--t-med), transform var(--t-med), visibility var(--t-med); }
  .asserts div { margin: 2px 0; }
  .asserts .warn { color: var(--gold); }

  .timeline { position: relative; padding-left: 26px; }
  .timeline::before { content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--line); }
  .tl-progress { position: absolute; left: 7px; top: 8px; width: 2px; height: calc(100% - 16px);
    background: var(--teal); transform-origin: top; transform: scaleY(0); transition: transform var(--t-med); }
  .event { position: relative; margin-bottom: 14px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 13px 16px; opacity: .32; filter: saturate(.25);
    transition: opacity var(--t-med), filter var(--t-med), border-color var(--t-med); cursor: pointer; }
  .event.shown { opacity: 1; filter: none; }
  .event.current { border-color: var(--ac, var(--teal)); box-shadow: 0 0 0 1px var(--ac, var(--teal)); }
  .event::before { content: ""; position: absolute; left: -25px; top: 18px; width: 12px; height: 12px;
    border-radius: 50%; background: var(--bg); border: 3px solid var(--line); transition: border-color var(--t-med); }
  .event.shown::before { border-color: var(--ac, var(--teal)); }
  .event.commit::before { animation: commit 450ms cubic-bezier(.23,1,.32,1) 1; }
  @keyframes commit { from { box-shadow: 0 0 0 0 rgba(13,148,136,.45); } to { box-shadow: 0 0 0 10px rgba(13,148,136,0); } }
  .event .top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .actor { font-size: 10.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    padding: 2.5px 9px; border-radius: 5px; background: var(--acs, var(--teal-soft)); color: var(--ac, var(--teal)); }
  .etype { font-size: 13px; color: var(--ink); font-weight: 600; }
  .toff { margin-left: auto; color: var(--dim); font-size: 11.5px; }
  .event .body { color: var(--muted); font-size: 13.5px; white-space: pre-wrap; }
  .event .body b { color: var(--ink); }
  .event .hashes { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line);
    font-size: 11px; color: var(--dim); display: none; }
  .event.open .hashes { display: block; }
  .event .hashes .hk { color: var(--dim); text-transform: uppercase; letter-spacing: .06em; font-size: 9.5px; }
  .event .hashes .hv { color: var(--muted); word-break: break-all; }
  .kv { display: inline-block; margin-right: 14px; }
  .kv .k { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; margin-right: 5px; }
  /* Only the roles that carry real signal get a hue: resolution (a dispute
     was argued and ruled on) and verasettle (money actually moved). Every
     other actor is told apart by its text label, not a seventh arbitrary
     color — seven simultaneous hues in one timeline read as noise, not
     information, and crowded out teal as a legible brand accent. */
  .event.a-intake, .event.a-compliance, .event.a-treasury, .event.a-orchestrator {
    --ac: var(--muted); --acs: var(--card); }
  .event.a-resolution { --ac: var(--gold); --acs: var(--gold-soft); }
  .event.a-auditor { --ac: var(--green); --acs: var(--green-soft); }
  .event.a-verasettle { --ac: var(--teal); --acs: var(--teal-soft); }
  .event.verdict-approved { --ac: var(--green); --acs: var(--green-soft); }
  .event.verdict-rejected { --ac: var(--red); --acs: var(--red-soft); }
  .event .body a { color: var(--blue); border-bottom: 1px solid var(--blue); }

  /* ---- decision → money ---- */
  /* moved above the 3-panel detail grid: this is the "whole journey at a
     glance" primer, so it reads as one horizontal strip before the reader
     drills into Summary/Timeline/Execution below — not a recap stranded
     at the bottom of the page after everything it summarizes. */
  .decmoney { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 14px 18px; margin: 16px 0 22px; }
  .decmoney .dmhead { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); margin-bottom: 10px; }
  .dmrow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .dm-node { background: var(--card); border: 1px solid var(--line); color: var(--dim);
    border-radius: 6px; padding: 8px 16px; font: inherit; font-size: 13px; cursor: pointer;
    white-space: nowrap; transition: border-color var(--t-fast), color var(--t-fast); }
  .dm-node.on { color: var(--ink); background: var(--panel); border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
  .dm-arrow { color: var(--dim); flex: none; }

  /* ---- counterfactual ---- */
  #cf { margin: 18px 0 0; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
  #cf summary { cursor: pointer; padding: 11px 16px; font-size: 13px; color: var(--muted); list-style: none; }
  #cf summary::-webkit-details-marker { display: none; }
  #cf summary b { color: var(--teal); }
  #cf .cfbody { padding: 4px 16px 14px; }
  #cf .cfrow { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  #cf label { font-size: 12px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
  #cf input { width: 110px; background: var(--card); color: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; padding: 5px 8px; font: inherit; font-size: 13px; }
  #cf button { background: var(--teal-soft); color: var(--teal); border: 1px solid var(--teal);
    border-radius: 6px; padding: 5px 12px; font: inherit; font-size: 12.5px; cursor: pointer; }
  .cfsum { font-size: 13px; margin: 6px 0; } .cfsum b { color: var(--ink); }
  .cfchg { font-size: 12px; color: var(--muted); padding: 3px 0; border-top: 1px solid var(--line); }
  .cfchg b.toreject { color: var(--red); } .cfchg b.toapprove { color: var(--green); }
  .cfcause { color: var(--dim); margin-left: 8px; } .cfnote { color: var(--dim); font-size: 11.5px; margin-top: 8px; font-style: italic; }

  /* ---- policies ---- */
  .policytext { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 16px 18px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px;
    white-space: pre-wrap; color: var(--ink); line-height: 1.6; }
  .paramgrid { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
  .param { background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; font-size: 12.5px; }
  .param b { display: block; color: var(--ink); }
  .policynote { color: var(--muted); font-size: 12.5px; margin: 10px 0 4px; max-width: 70ch; }

  /* ---- failures ---- */
  .failcards { display: flex; gap: 10px; flex-wrap: wrap; margin: 6px 0 4px; }
  .failcard { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 16px; cursor: pointer; min-width: 150px;
    transition: border-color var(--t-fast); }
  .failcard.active { border-color: var(--teal); box-shadow: 0 0 0 1px var(--teal); }
  @media (hover:hover){ .failcard:hover { border-color: var(--dim); } }
  .failcard .fc-n { font-size: 32px; font-weight: 700; letter-spacing: -.02em; }
  .failcard .fc-l { color: var(--muted); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
  .failcard.zero .fc-n { color: var(--dim); }
  .byrule { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin: 12px 0; min-height: 70px; }
  .barwrap { display: flex; flex-direction: column; align-items: center; gap: 6px; justify-content: flex-end; }
  .bar { width: 44px; background: var(--teal); border-radius: 6px 6px 0 0; min-height: 4px; }
  .barwrap .bl { font-size: 11px; color: var(--muted); } .barwrap .bn { font-size: 11px; color: var(--dim); }

  /* ---- analytics ---- */
  table.bench { width: 100%; max-width: 640px; border-collapse: collapse; font-size: 14px; margin: 10px 0; }
  table.bench th, table.bench td { padding: 10px 14px; border-bottom: 1px solid var(--line); text-align: left; }
  table.bench th { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
  table.bench td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.bench .yes { color: var(--green); font-weight: 700; } table.bench .no { color: var(--red); font-weight: 700; }
  table.bench tr.headline td { font-size: 15px; font-weight: 600; background: var(--green-soft); }

  /* ---- evidence pack ---- */
  .evpack { max-width: 560px; }
  .evcheck { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px;
    border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; background: var(--panel); font-size: 14px; }
  .evcheck .ec-ok { color: var(--green); font-weight: 700; }
  .evcheck .ec-no { color: var(--dim); font-weight: 700; }
  .evbtns { display: flex; gap: 10px; margin-top: 16px; }
  .evbtns button { background: var(--teal-strong); border: 1px solid var(--teal-strong); color: #fff; font-weight: 600;
    border-radius: 6px; padding: 9px 18px; font: inherit; font-size: 13px; cursor: pointer; }
  .evbtns button.ghost { background: var(--card); color: var(--ink); border-color: var(--line); font-weight: 500; }

  /* ---- live panel ---- */
  #live { display: none; margin: 16px 0 0; border: 1px solid var(--gold); border-radius: 8px; background: var(--gold-soft); padding: 12px 16px; }
  #live.on { display: block; }
  #live .lhead { color: var(--gold); font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  #live .lhead .mono { font-weight: 400; color: var(--muted); margin-left: 10px; }
  #liveGraph { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 0 0 10px; }
  #liveGraph .ln { display: flex; align-items: center; gap: 6px; color: var(--dim);
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; transition: color 200ms ease; }
  #liveGraph .ln i { width: 10px; height: 10px; border-radius: 50%; flex: none;
    background: var(--panel); border: 2px solid var(--line); transition: border-color 200ms ease, background 200ms ease; }
  #liveGraph .ln.spoke { color: var(--lac); } #liveGraph .ln.spoke i { border-color: var(--lac); }
  #liveGraph .ln.done i { background: var(--lac); }
  #liveGraph .sep { flex: none; width: 14px; height: 1px; background: var(--line); }
  #liveFeed { max-height: 220px; overflow-y: auto; font-size: 12px; }
  #liveFeed div { padding: 2px 0; color: var(--muted); }
  #liveFeed .la { display: inline-block; min-width: 92px; font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .05em; }
  #liveFeed b { color: var(--ink); font-weight: 600; }

  footer { text-align: center; padding: 10px; font-size: 11.5px; color: var(--dim); }
  footer code { color: var(--muted); }

  /* ---- print: evidence pack one-pager ---- */
  @media print {
    body { display: block; }
    .side, .trustbar, .controls, .evbtns, #cf, #liveBtn, #live { display: none !important; }
    .stage { padding: 0; }
    [data-view]:not(#view-evidence) { display: none !important; }
  }
</style>
</head>
<body>
<nav class="side">
  <div class="wm">ClearCrew</div>
  <div class="wmsub">Trust Layer for Autonomous Payouts</div>
  <a class="navlink" href="#/overview"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.25"/><path d="M8 4.75V8l2.25 1.3"/></svg>Overview</a>
  <a class="navlink" href="#/ops"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="3" cy="8" r="1.6"/><circle cx="13" cy="3.3" r="1.6"/><circle cx="13" cy="12.7" r="1.6"/><path d="M4.5 7.3 11.5 4M4.5 8.7l7 4"/></svg>Operations</a>
  <a class="navlink" href="#/policies"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3.25" y="2" width="9.5" height="12" rx="1.25"/><path d="M5.75 5.5h4.5M5.75 8h4.5M5.75 10.5h2.75"/></svg>Policies</a>
  <a class="navlink" href="#/evidence"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.75c2.1.9 4.25 1.15 4.25 1.15v4.4c0 3.35-2.1 5.4-4.25 6.2-2.15-.8-4.25-2.85-4.25-6.2V2.9S5.9 2.65 8 1.75Z"/><path d="M5.85 8.1 7.3 9.55 10.25 6.4"/></svg>Evidence</a>
  <a class="navlink" href="#/failures"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2.25 14.25 13H1.75L8 2.25Z"/><path d="M8 6.75v3M8 11.5v.05"/></svg>Failures</a>
  <a class="navlink" href="#/analytics"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 13.5v-4M7 13.5v-8M11.5 13.5v-6M14 2.5 9.9 6.6 7.3 4l-4.6 4.6"/></svg>Analytics</a>
  <div class="navgap"></div>

</nav>

<div class="col">
  <div class="trustbar">
    <span>Every decision here is</span>
    <span><b>✓</b> Recorded</span><span><b>✓</b> Replayable</span>
    <span><b>✓</b> Attributable</span><span><b>✓</b> Exportable</span>
  </div>
  <div class="stage">
    <section id="view-overview" data-view hidden><div class="loading">loading…</div></section>
    <section id="view-ops" data-view hidden><div class="loading">loading…</div></section>
    <section id="view-policies" data-view hidden><div class="loading">loading…</div></section>
    <section id="view-evidence" data-view hidden><div class="loading">loading…</div></section>
    <section id="view-failures" data-view hidden><div class="loading">loading…</div></section>
    <section id="view-analytics" data-view hidden><div class="loading">loading…</div></section>
    <div id="live" role="status">
      <div class="lhead">live run in progress <span class="mono" id="liveMeta"></span></div>
      <div id="liveGraph" aria-hidden="true"></div>
      <div id="liveFeed"></div>
    </div>
  </div>
  <footer id="foot"></footer>
</div>

<script>
const $ = (s, r=document) => r.querySelector(s);
const api = async (p) => { const r = await fetch(p); if (!r.ok) throw new Error(p); return r.json(); };
const fmtUSD = (a) => a == null ? "—" : "$" + a.toLocaleString(undefined, {minimumFractionDigits: 0});
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const navigate = (h) => { location.hash = h; };
const RULE_LABELS = { P1: "sanctioned destination", P2: "high-value + new account",
  P3: "reserve-floor waterfall", P4: "flagged, not grounds for rejection" };
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtRunStamp(runName) {
  // "events-20260704-200058-settled-n6.jsonl" -> "Jul 4, 20:00"
  const m = /events-(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})/.exec(runName);
  if (!m) return runName;
  const [, , mo, d, h, mi] = m;
  return `${MONTHS[+mo - 1]} ${+d}, ${h}:${mi}`;
}

function statusChip(status, {disputed, miss, settled} = {}) {
  const cls = settled ? "settled" : status;
  let html = `<span class="chip ${cls}">${settled ? "settled" : status}</span>`;
  if (disputed) html = `<span class="chip escalated">escalated</span>` + html;
  if (miss) html += ` <span class="chip miss">miss</span>`;
  return html;
}
function showError(sel, retry) {
  const el = $(sel); if (!el) return;
  el.innerHTML = `<div class="err">couldn’t reach the event log<button>retry</button></div>`;
  el.querySelector("button").onclick = retry;
}

// Every `[data-go]` element (table rows, link-like spans) navigates on click
// AND keyboard — role/tabindex are added here rather than per-markup so the
// pattern can't drift the way it did between the ops list and other tables.
function wireGo(root) {
  root.querySelectorAll("[data-go]").forEach(el => {
    el.setAttribute("tabindex", "0");
    el.setAttribute("role", "button");
    el.onclick = () => navigate(el.dataset.go);
    el.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); navigate(el.dataset.go); } };
  });
}
// Same idea for click-to-expand elements (timeline hash detail).
function wireExpandable(nodes) {
  nodes.forEach(el => {
    el.setAttribute("tabindex", "0");
    el.setAttribute("role", "button");
    el.setAttribute("aria-expanded", "false");
    const toggle = () => { const open = el.classList.toggle("open"); el.setAttribute("aria-expanded", String(open)); };
    el.onclick = toggle;
    el.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); } };
  });
}

// ── router ──────────────────────────────────────────────────────────────────
const VIEWS = ["overview", "ops", "policies", "evidence", "failures", "analytics"];
function route() {
  const parts = (location.hash || "#/overview").slice(1).split("/").filter(Boolean);
  const name = VIEWS.includes(parts[0]) ? parts[0] : "overview";
  const rest = parts.slice(1);
  // leaving Operations mid-playback used to leave the 1.8s autoplay timer
  // running against a now-hidden view indefinitely — stop it on any navigation away.
  if (name !== "ops" && playTimer) stopPlay();
  document.querySelectorAll("[data-view]").forEach(s => s.hidden = s.id !== `view-${name}`);
  document.querySelectorAll(".navlink").forEach(a => {
    const on = a.getAttribute("href") === `#/${name}`;
    if (on) a.setAttribute("aria-current", "page"); else a.removeAttribute("aria-current");
  });
  RENDERERS[name](rest);
}
window.addEventListener("hashchange", route);

// ── OVERVIEW ────────────────────────────────────────────────────────────────
async function renderOverview() {
  const el = $("#view-overview");
  el.innerHTML = `<div class="loading">reading recorded history…</div>`;
  let o; try { o = await api("/api/overview"); } catch { return showError("#view-overview", renderOverview); }
  const t = o.totals;
  el.innerHTML = `
    <div class="vhead"><h1>Recorded History</h1>
      <span class="sub">every number below is folded from append-only event logs — nothing staged</span></div>
    <div class="stats">
      <div class="stat"><b>${t.runs}</b>runs</div>
      <div class="stat"><b>${t.payouts}</b>payouts</div>
      <div class="stat"><b>${t.settlements}</b>on-chain settlements</div>
      <div class="stat"><b>${t.usdc_moved}</b>USDC moved (testnet)</div>
      <div class="stat win"><b>${t.replay_pct}%</b>replay coverage</div>
      <div class="stat chain-ok"><b>${t.hash_verified_pct}%</b>hash verified</div>
    </div>
    <div class="vhead" style="margin-top:22px"><h1 style="font-size:15px">Recent activity</h1></div>
    <table class="grid"><thead><tr><th>Payout</th><th>Run</th><th>Amount</th><th>Status</th><th></th></tr></thead>
    <tbody>${o.recent.map(p => `
      <tr class="clickable" data-go="#/ops/${esc(p.run)}/${esc(p.id)}">
        <td class="mono">${esc(p.id)}</td>
        <td class="meta">${esc(fmtRunStamp(p.run))}</td>
        <td class="num">${fmtUSD(p.amount)}</td>
        <td>${statusChip(p.status, {disputed: p.disputed, miss: p.miss, settled: p.settled})}</td>
        <td class="linklike">${p.settled ? "Receipt" : "Replay"} →</td>
      </tr>`).join("")}</tbody></table>`;
  wireGo(el);
}

// ── OPERATIONS + payout detail ──────────────────────────────────────────────
let opsRuns = null;      // cached /api/runs
let chain = [], step = 0, playTimer = null, runChain = null, payoutExpected = null, pulsed = false, keyRepeat = false;

async function renderOps(rest) {
  const el = $("#view-ops");
  if (!opsRuns) { try { opsRuns = (await api("/api/runs")).runs; } catch { return showError("#view-ops", () => renderOps(rest)); } }
  const settled = opsRuns.filter(r => r.name.includes("-settled-"));
  const def = (rest[0] && opsRuns.find(r => r.name === rest[0]))
    || settled[settled.length - 1] || opsRuns[opsRuns.length - 1];
  if (!el.dataset.built) {
    el.innerHTML = `
      <div class="vhead"><h1>Operations</h1><span class="sub">pick a payout to replay its recorded decision → execution → evidence</span>
        <select class="runsel" id="runSel" aria-label="Select run" style="margin-left:auto"></select></div>
      <div class="opsgrid"><div id="opsList"><div class="loading">reading…</div></div>
      <div id="opsDetail"><div class="placeholder">Pick a payout on the left to replay its recorded event chain.<br><br>
        <span class="chip disputed">escalated</span> payouts show a veto argued and ruled on the record.</div></div></div>`;
    el.dataset.built = "1";
    const sel = $("#runSel");
    sel.innerHTML = opsRuns.map(r => `<option value="${esc(r.name)}">${esc(r.stamp)} · n=${r.n}${r.results ? " · benchmarked" : ""}</option>`).join("");
    sel.onchange = () => navigate(`#/ops/${sel.value}`);
  }
  $("#runSel").value = def.name;
  await loadOpsList(def.name);
  if (rest[1]) {
    const row = document.querySelector(`.payout[data-id="${CSS.escape(rest[1])}"]`);
    if (row) { row.scrollIntoView({block: "center"}); await selectPayout(def.name, rest[1], row); }
  }
}

async function loadOpsList(name) {
  const list = $("#opsList");
  $("#foot").innerHTML = `source: <code>runs/${esc(name)}</code> — append-only JSONL, state = fold(events)`;
  list.innerHTML = `<div class="loading">reading event log…</div>`;
  let d; try { d = await api(`/api/runs/${name}`); } catch { return showError("#opsList", () => loadOpsList(name)); }
  runChain = d.chain;
  list.innerHTML = `<h2>${d.payouts.length} payouts · ${d.total_events} events` +
    (runChain && runChain.hashed ? (runChain.verified ? ` · chain verified` : ` · CHAIN BROKEN`) : ``) + `</h2>` +
    d.payouts.map(p => `
      <div class="payout" data-id="${esc(p.id)}" role="button" tabindex="0">
        <span class="amt">${fmtUSD(p.amount)} <span class="meta">${esc(p.corridor ?? "")}</span></span>
        <div class="chips">
          ${p.disputed ? '<span class="chip escalated">escalated</span>' : ""}
          ${p.miss ? '<span class="chip miss">miss</span>' : ""}
          <span class="chip ${p.status === "settled" ? "settled" : p.status}">${p.status}</span></div>
        <span class="meta mono">${esc(p.id)} · recipient ${p.recipient_age_days ?? "?"}d · ${p.events} events</span>
      </div>`).join("");
  list.querySelectorAll(".payout").forEach(row => {
    const go = () => navigate(`#/ops/${name}/${row.dataset.id}`);
    row.onclick = go;
    row.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); } };
  });
}

async function selectPayout(run, subject, row) {
  stopPlay();
  document.querySelectorAll(".payout").forEach(e => e.classList.remove("active"));
  if (row) row.classList.add("active");
  let data; try { data = await api(`/api/runs/${run}/explain/${subject}`); }
  catch { return showError("#opsDetail", () => selectPayout(run, subject, row)); }
  renderPayoutDetail(run, subject, data);
}

function foldFinal(ch) {
  let label = "pending", disputed = false, settled = false;
  for (const e of ch) {
    if (e.type === "dispute.resolved") disputed = true;
    if (e.type === "payout.approved") label = "APPROVED";
    if (e.type === "payout.rejected") label = "REJECTED";
    if (e.type === "payout.settled") { label = "SETTLED"; settled = true; }
  }
  return {label, disputed, settled};
}

function trustStrip(ch, verification) {
  const has = (t) => ch.some(e => e.type === t);
  const decided = has("payout.approved") || has("payout.rejected") || has("payout.settled");
  const settled = has("payout.settled");
  const evidence = verification && verification.hashed;
  const mark = (ok) => ok ? '<span class="tc ok">✓</span>' : '<span class="tc no">—</span>';
  return `<div class="truststrip">
    <span>Decision ${mark(decided)}</span><span>Replay ${mark(ch.length > 0)}</span>
    <span>Settlement ${mark(settled)}</span><span>Evidence ${mark(evidence)}</span></div>`;
}

function renderPayoutDetail(run, subject, data) {
  chain = data.chain; step = 0; pulsed = false;
  payoutExpected = (data.payout || {})._expected || null;
  const p = data.payout || {};
  const fin = foldFinal(chain);
  const decision = fin.disputed && !fin.settled ? "ESCALATED" : (fin.label === "SETTLED" ? "APPROVED" : fin.label);
  $("#opsDetail").innerHTML =
    trustStrip(chain, data.verification) +
    `<div class="payout-head"><h2>${fmtUSD(p.amount)} <span class="mono" style="color:var(--dim);font-size:15px">${esc(subject)}</span></h2></div>
    ${decisionMoney(chain, run, subject)}
    <div class="tabbar" role="tablist">
      <button class="tabbtn" role="tab" id="tabbtn-decision" aria-controls="tab-decision" data-tab="decision">Decision</button>
      <button class="tabbtn" role="tab" id="tabbtn-replay" aria-controls="tab-replay" data-tab="replay">Replay</button>
      <button class="tabbtn" role="tab" id="tabbtn-execution" aria-controls="tab-execution" data-tab="execution">Execution</button>
    </div>
    <div class="tabpanel panel" role="tabpanel" id="tab-decision" aria-labelledby="tabbtn-decision"><h3>Summary</h3>
      <div class="kvline"><span class="k">Amount</span><b>${fmtUSD(p.amount)}</b></div>
      <div class="kvline"><span class="k">Corridor</span><b>${esc((p.from_country ?? "?") + " → " + (p.to_country ?? "?"))}</b></div>
      <div class="kvline"><span class="k">Recipient age</span><b>${p.recipient_age_days ?? "?"}d</b></div>
      <div class="kvline"><span class="k">Memo</span><b>${esc(p.memo || "—")}</b></div>
      <div class="kvline kvbreak"><span class="k">Decision</span><b>${decision}</b></div>
      <div class="kvline"><span class="k">Execution</span><b>${fin.settled ? "SETTLED" : "NOT EXECUTED"}</b></div>
      <div class="kvline"><span class="k">Expected</span><b>${esc(p._expected ?? "?")}</b></div>
    </div>
    <div class="tabpanel" role="tabpanel" id="tab-replay" aria-labelledby="tabbtn-replay" hidden>
      <div class="controls">
        <button id="prev">← Prev</button><button id="next" class="primary">Next →</button>
        <button id="play">▶ Play</button><span class="pos" id="pos"></span>
        <span class="hint">arrow keys work too · click an event for its hashes</span></div>
      <div class="statebar"><span class="k">state</span><span class="v" id="foldState">pending</span><span class="t" id="foldTime"></span></div>
      <div class="timeline"><div class="tl-progress"></div>${chain.map(renderEvent).join("")}</div>
      <div class="asserts" id="asserts"></div>
    </div>
    <div class="tabpanel" role="tabpanel" id="tab-execution" aria-labelledby="tabbtn-execution" hidden>${execPanel(chain)}</div>`;
  $("#prev").onclick = () => go(step - 1);
  $("#next").onclick = () => go(step + 1);
  $("#play").onclick = togglePlay;
  wireExpandable($("#opsDetail").querySelectorAll(".event"));
  $("#opsDetail").querySelectorAll(".dm-node").forEach(n => n.onclick = () => onDmNode(n.dataset.node, run, subject));
  $("#opsDetail").querySelectorAll(".tabbtn").forEach(b => b.onclick = () => switchTab(b.dataset.tab));
  switchTab("decision");
  go(1);
}

function switchTab(name) {
  // plain Tab-through-all-three + native Enter/Space activation (every tab
  // button stays reachable) rather than the roving-tabindex + arrow-key
  // pattern real ARIA tablists use — that pattern needs its own keydown
  // handler, and this page's ArrowLeft/ArrowRight are already claimed by
  // the timeline scrubber. Trading one extra Tab press for not shipping a
  // half-built roving-tabindex implementation.
  $("#opsDetail").querySelectorAll(".tabbtn").forEach(b => {
    b.setAttribute("aria-selected", String(b.dataset.tab === name));
  });
  $("#opsDetail").querySelectorAll(".tabpanel").forEach(p => { p.hidden = p.id !== `tab-${name}`; });
  // the timeline's progress-bar fill and scroll position are computed from
  // the container's real layout box, which is 0 while its tabpanel is
  // `hidden` — recompute now that "replay" just became visible.
  if (name === "replay") go(step);
}

function onDmNode(node, run, subject) {
  if (node === "Policy") return navigate("#/policies");
  if (node === "Evidence") return navigate(`#/evidence/${run}/${subject}`);
  const map = {Decision: ["compliance.reviewed", "treasury.decided"], Approval: ["payout.approved", "payout.rejected"],
    Verasettle: ["settlement.requested"], Settlement: ["payout.settled"], Receipt: ["settlement.confirmed"]};
  const types = map[node] || [];
  const idx = chain.findIndex(e => types.includes(e.type));
  if (idx >= 0) {
    switchTab("replay");
    go(idx + 1);
    const cur = document.querySelector(".event.current");
    if (cur) cur.classList.add("open");
  }
}

function renderEvent(e, i) {
  const actor = e.actor.toLowerCase();
  let cls = `event a-${actor}`;
  if (e.type === "payout.approved") cls += " verdict-approved";
  if (e.type === "payout.rejected") cls += " verdict-rejected";
  const P = e.payload || {};
  let body = "";
  const kv = (k, v) => v ? `<span class="kv"><span class="k">${k}</span><b>${esc(v)}</b></span>` : "";
  body += kv("risk tier", P.risk_tier) + kv("verdict", P.verdict) + kv("rule cited", P.policy_rule)
        + kv("action", P.action) + kv("ruling", P.ruling && P.ruling.replace(/_/g, " "));
  const text = P.reason || P.explanation || "";
  if (text) body += (body ? "\n" : "") + esc(text);
  if (e.type === "payout.approved") body = "Final: payout approved for settlement.";
  if (e.type === "payout.rejected") body = "Final: payout rejected." + (P.reason ? "\n" + esc(P.reason) : "");
  if (e.type === "settlement.requested")
    body = `→ Execution requested on the ${esc(P.rail)} rail: <b>${fmtUSD(P.source_amount_usd)}</b> source → <b>${P.settled_amount_usdc} USDC</b> on ${esc(P.chain)} (${esc(P.scale)}).`;
  if (e.type === "settlement.confirmed") {
    cls = "event a-verasettle";
    body = `Real testnet USDC moved on ${esc(P.chain)}: <b>${P.settled_amount_usdc} USDC</b>` +
      (P.tx_hash ? `\ntx <a href="${esc(P.explorer)}" target="_blank" rel="noopener" class="mono">${esc(P.tx_hash.slice(0, 22))}…</a>` : "");
  }
  if (e.type === "payout.settled") { cls += " verdict-approved"; body = "Final: settled on-chain." + (P.tx_hash ? ` tx <span class="mono">${esc(P.tx_hash.slice(0, 22))}…</span>` : ""); }
  if (e.type === "compliance.fast_tracked") body = "Low-risk — fast-tracked past full compliance review (per intake risk tier).";
  const hashes = `<div class="hashes"><div><span class="hk">event_hash</span> <span class="hv mono">${esc(e.event_hash || "—")}</span></div>

    <div><span class="hk">policy</span> <span class="hv">${esc(P.policy_rule || "v1")}</span></div></div>`;
  return `<div class="${cls}" data-i="${i}">
    <div class="top"><span class="actor">${esc(e.actor)}</span><span class="etype">${esc(e.type)}</span>
      <span class="toff mono">t+${e.t_offset}s · ${esc(e.id)}</span></div>
    <div class="body">${body}</div>${hashes}</div>`;
}

// timeline scrubbing (ported)
function foldUpTo(k) {
  let s = {label: "pending", color: "var(--muted)"};
  for (const e of chain.slice(0, k)) {
    const P = e.payload || {};
    if (e.type === "intake.classified") s = {label: `triaged — ${P.risk_tier} risk`, color: "var(--blue)"};
    if (e.type === "compliance.fast_tracked") s = {label: "fast-tracked", color: "var(--blue)"};
    if (e.type === "compliance.reviewed") s = P.verdict === "veto" ? {label: `vetoed (${P.policy_rule}) — in dispute`, color: "var(--gold)"} : {label: "compliance-cleared", color: "var(--violet)"};
    if (e.type === "treasury.decided") s = P.action === "pay_now" ? {label: "cleared for funding", color: "var(--violet)"} : {label: "treasury-rejected", color: "var(--red)"};
    if (e.type === "dispute.resolved") s = {label: (P.ruling || "resolved").replace(/_/g, " "), color: "var(--gold)"};
    if (e.type === "payout.approved") s = {label: "APPROVED", color: "var(--green)"};
    if (e.type === "payout.rejected") s = {label: "REJECTED", color: "var(--red)"};
    if (e.type === "settlement.requested") s = {label: "executing on rail…", color: "#0d9488"};
    if (e.type === "settlement.confirmed") s = {label: "USDC moved — tx confirmed", color: "#0d9488"};
    if (e.type === "payout.settled") s = {label: "SETTLED ON-CHAIN", color: "var(--green)"};
  }
  return s;
}

function go(n) {
  const target = Math.max(1, Math.min(chain.length, n));
  const forward = target > step; step = target;
  const evs = document.querySelectorAll("#opsDetail .event");
  evs.forEach((el, i) => { el.classList.toggle("shown", i < step); el.classList.toggle("current", i === step - 1); });
  const cur = document.querySelector("#opsDetail .event.current");
  if (cur && forward) { cur.classList.remove("commit"); void cur.offsetWidth; cur.classList.add("commit"); }
  const smooth = (keyRepeat || matchMedia("(prefers-reduced-motion: reduce)").matches) ? "auto" : "smooth";
  keyRepeat = false;
  if (cur) cur.scrollIntoView({block: "nearest", behavior: smooth});
  $("#pos").textContent = `event ${step} / ${chain.length}`;
  $("#prev").disabled = step <= 1; $("#next").disabled = step >= chain.length;
  const tl = document.querySelector("#opsDetail .timeline"), prog = document.querySelector("#opsDetail .tl-progress");
  if (cur && tl && prog) { const f = (cur.offsetTop + 24) / (tl.scrollHeight - 16); prog.style.transform = `scaleY(${Math.min(1, f)})`; }
  const s = foldUpTo(step), fs = $("#foldState");
  if (fs) { fs.textContent = s.label; fs.style.color = s.color; }
  const sb = document.querySelector("#opsDetail .statebar");
  if (sb) { const ok = s.label === "APPROVED" || s.label === "SETTLED ON-CHAIN";
    sb.classList.toggle("ok", ok); sb.classList.toggle("bad", s.label === "REJECTED");
    if (ok && !pulsed) { sb.classList.add("pulse"); pulsed = true; } }
  const ft = $("#foldTime"); if (ft) ft.textContent = `t+${chain[step - 1].t_offset}s`;
  const az = $("#asserts");
  if (az) {
    az.classList.toggle("show", step === chain.length);
    if (step === chain.length) {
      const final = s.label, finalApproved = final === "APPROVED" || final === "SETTLED ON-CHAIN";
      const matches = payoutExpected && ((payoutExpected === "approve") === finalApproved);
      az.innerHTML = `<div>✓ reconstructed from ${chain.length} recorded events — replay of the actual run, nothing staged</div>` +
        (runChain && runChain.hashed ? (runChain.verified ? `<div>✓ hash chain verified across all ${runChain.events} events in this run</div>`
          : `<div class="warn">✗ hash chain broken at event ${runChain.broken_at}</div>`)
          : `<div class="warn">— run recorded before hash chaining (replayable, not tamper-evident)</div>`) +
        (payoutExpected ? (matches ? `<div>✓ outcome matches policy ground truth (${payoutExpected})</div>`
          : `<div class="warn">✗ outcome differs from policy ground truth (expected: ${payoutExpected})</div>`) : "");
    }
  }
  if (step === chain.length) stopPlay();
}
function togglePlay() {
  if (playTimer) return stopPlay();
  if (step >= chain.length) go(1);
  $("#play").textContent = "⏸ Pause";
  playTimer = setInterval(() => step < chain.length ? go(step + 1) : stopPlay(), 1800);
}
function stopPlay() { clearInterval(playTimer); playTimer = null; const b = $("#play"); if (b) b.textContent = "▶ Play"; }
document.addEventListener("keydown", (e) => {
  if (!$("#view-ops") || $("#view-ops").hidden || !chain.length) return;
  keyRepeat = e.repeat;
  if (e.key === "ArrowRight") go(step + 1);
  if (e.key === "ArrowLeft") go(step - 1);
});

async function runCounterfactual() {
  const runName = $("#cfRunSel").value;
  // the API rejects these server-side too (never trust the input-level `min`
  // alone — that only shapes the spinner, it doesn't block typed values or
  // this button's manual fetch) — checked here first for an accurate message
  // instead of a generic "couldn't reach the event log" on the round trip.
  const floor = $("#cfFloor").value, p2amt = $("#cfP2").value, p2age = $("#cfAge").value;
  if ([floor, p2amt, p2age].some(v => v !== "" && Number(v) < 0) || (p2age !== "" && Number(p2age) > 365)) {
    $("#cfOut").innerHTML = `<div class="err">policy parameters must be zero or positive, and P2 age ≤ 365 days</div>`;
    return;
  }
  const q = new URLSearchParams();
  if (floor) q.set("reserve_floor", floor);
  if (p2amt) q.set("p2_amount", p2amt);
  if (p2age) q.set("p2_age_days", p2age);
  let r; try { r = await api(`/api/runs/${runName}/counterfactual?` + q); } catch { return showError("#cfOut", runCounterfactual); }
  const s = r.summary;
  $("#cfOut").innerHTML = `
    <div class="cfsum">policy in force: <b>${s.in_force.approve}</b> approve / <b>${s.in_force.reject}</b> reject
      &nbsp;→&nbsp; hypothetical: <b>${s.hypothetical.approve}</b> approve / <b>${s.hypothetical.reject}</b> reject
      &nbsp;·&nbsp; <b>${r.changes.length}</b> payout${r.changes.length === 1 ? "" : "s"} would change</div>` +
    (r.changes.length ? r.changes.map(c => `
      <div class="cfchg mono">${esc(c.payout_id)} · ${fmtUSD(c.amount)} · recorded ${esc(c.recorded_outcome ?? "—")} ·
        ${esc(c.in_force.verdict)} → <b class="to${c.hypothetical.verdict}">${esc(c.hypothetical.verdict)}</b>
        <span class="cfcause">${esc(c.cause)}</span></div>`).join("")
      : '<div class="cfchg">no payout changes under these parameters</div>') +
    `<div class="cfnote">${esc(r.note)}</div>`;
}

// ── judge mode: watch the society deliberate live, then replay it ──
const ACTORS = {intake: "var(--blue)", compliance: "var(--violet)", treasury: "#7e22ce",
  resolution: "var(--gold)", auditor: "var(--green)", verasettle: "#0d9488", orchestrator: "var(--muted)"};
const GRAPH_ACTORS = ["intake", "compliance", "treasury", "resolution", "auditor", "verasettle"];
let liveTimer = null, liveRendered = 0;

async function startLive() {
  const code = prompt("Judge access code (from the submission notes):");
  if (!code) return;
  const r = await fetch(`/api/live/start?code=${encodeURIComponent(code)}`, {method: "POST"});
  const body = await r.json().catch(() => ({}));
  if (r.status === 409) { watchLive("a run is already in progress — watching it live"); return; }
  if (!r.ok) { alert(body.detail || "couldn't start a live run"); return; }
  watchLive("live Qwen calls + real testnet settlement · 3–6 min");
}
function buildLiveGraph() {
  $("#liveGraph").innerHTML = GRAPH_ACTORS.map((a, i) =>
    (i ? '<span class="sep"></span>' : "") + `<span class="ln" data-actor="${a}" style="--lac:${ACTORS[a]}"><i></i>${a}</span>`).join("");
}
function pulseActor(actor, done) {
  const node = document.querySelector(`#liveGraph .ln[data-actor="${actor}"]`);
  if (!node) return;
  node.classList.add("spoke"); if (done) node.classList.add("done");
  if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  node.querySelector("i").animate([{transform: "scale(1)"}, {transform: "scale(1.6)"}, {transform: "scale(1)"}], {duration: 420, easing: "cubic-bezier(.23,1,.32,1)"});
}
function watchLive(meta) {
  $("#live").classList.add("on"); buildLiveGraph();
  $("#liveBtn").disabled = true; $("#liveBtn").classList.add("running"); $("#liveBtnLabel").textContent = "running…";
  $("#liveFeed").innerHTML = ""; liveRendered = 0; $("#liveMeta").textContent = meta;
  liveTimer = setInterval(pollLive, 2500); pollLive();
}
async function pollLive() {
  let s; try { s = await api("/api/live/status"); } catch { return; }
  if (s.state === "running") {
    const feed = $("#liveFeed"), evs = s.events || [];
    const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 24;
    for (let i = liveRendered; i < evs.length; i++) {
      const e = evs[i], P = e.payload || {};
      const gist = P.risk_tier ? `risk ${P.risk_tier}` : P.verdict || P.action || (P.ruling || "").replace(/_/g, " ") || (P.tx_hash ? P.tx_hash.slice(0, 18) : "") || "";
      const d = document.createElement("div");
      d.innerHTML = `<span class="la" style="color:${ACTORS[e.actor] || "var(--muted)"}">${esc(e.actor)}</span> <b>${esc(e.type)}</b> <span class="mono">${e.subject !== "batch" ? esc(e.subject) : ""}</span> ${esc(gist)}`;
      feed.appendChild(d); pulseActor(e.actor, e.type === "settlement.confirmed");
    }
    liveRendered = evs.length;
    $("#liveMeta").textContent = `${evs.length} events · ${Math.round(s.elapsed)}s elapsed`;
    if (atBottom) feed.scrollTop = feed.scrollHeight;
    return;
  }
  clearInterval(liveTimer); liveTimer = null;
  $("#liveBtn").disabled = false; $("#liveBtn").classList.remove("running"); $("#liveBtnLabel").textContent = "live run";
  if (s.state === "done" && s.run) {
    $("#liveMeta").textContent = "done — loading your run";
    opsRuns = null;                      // force /api/runs refresh so the new run appears
    navigate(`#/ops/${s.run}`);
    setTimeout(() => $("#live").classList.remove("on"), 1200);
  } else {
    $("#liveMeta").textContent = "the live run failed — its events are recorded, not hidden; every archived run still replays";
  }
}
$("#liveBtn").onclick = startLive;

// boot
if (!location.hash) location.hash = "#/overview";
route();
</script>
</body>
</html>
