<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="'IBM Plex Sans','Segoe UI',-apple-system,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8a93a3"/>
    </marker>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#e0ddd2"/>
    </pattern>
    <filter id="ps" x="-8%" y="-8%" width="116%" height="126%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#17211c" flood-opacity=".08"/>
    </filter>
    <linearGradient id="tealbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b766b"/><stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <style>
    .panel { fill:#ffffff; stroke:#e3e1d6; filter:url(#ps); }
    .t   { fill:#17211c; font-size:15px; font-weight:600; }
    .s   { fill:#4d5560; font-size:12px; }
    .d   { fill:#667080; font-size:11px; }
    .mono{ font-family:'IBM Plex Mono','SF Mono',Consolas,monospace; }
    .st  { font-size:13.5px; font-weight:700; letter-spacing:.06em; }
    .lbl { fill:#667080; font-size:10px; letter-spacing:.12em; font-weight:700; }
    .teal{ fill:#0b766b; }
    .flow{ stroke:#8a93a3; stroke-width:1.6; fill:none; marker-end:url(#arr); stroke-linecap:round; }
  </style>

  <rect width="960" height="640" fill="#f7f6f2"/>
  <rect width="960" height="640" fill="url(#dots)"/>
  <rect x="0" y="0" width="960" height="3" fill="url(#tealbar)"/>

  <text x="40" y="44" class="t" font-size="13">ClearCrew <tspan fill="#9aa2b1">· system documentation</tspan></text>
  <text x="920" y="44" text-anchor="end" class="teal" font-size="11" font-weight="600">verified across all 10 recorded runs</text>
  <line x1="40" y1="58" x2="920" y2="58" stroke="#e3e1d6"/>
  <text x="40" y="96" fill="#17211c" font-size="26" font-weight="700" letter-spacing="-.02">decision state machine</text>
  <text x="40" y="118" class="s">every payout reaches exactly one terminal decision; SETTLED requires a receipt</text>

  <!-- pending -->
  <rect x="400" y="146" width="160" height="46" rx="10" class="panel"/>
  <text x="480" y="175" class="st" fill="#667080" text-anchor="middle">PENDING</text>

  <!-- three lanes -->
  <path d="M440 192 C400 214 320 218 268 240" class="flow"/>
  <line x1="480" y1="192" x2="480" y2="240" class="flow"/>
  <path d="M520 192 C560 214 640 218 692 240" class="flow"/>
  <text x="60" y="178" class="d mono" font-size="10.5">compliance.fast_tracked</text>
  <text x="492" y="222" class="d mono" font-size="10.5">compliance.reviewed</text>
  <text x="700" y="178" class="d mono" font-size="10.5">compliance.reviewed = veto</text>

  <rect x="150" y="244" width="180" height="46" rx="10" class="panel"/>
  <text x="240" y="272" class="s" font-weight="700" text-anchor="middle">fast-tracked (low risk)</text>

  <rect x="392" y="244" width="176" height="46" rx="10" class="panel"/>
  <text x="480" y="272" class="s" font-weight="700" text-anchor="middle">reviewed — clear</text>

  <rect x="620" y="244" width="190" height="46" rx="10" fill="#ffffff" stroke="#92400e" filter="url(#ps)"/>
  <text x="715" y="265" class="st" fill="#92400e" text-anchor="middle" font-size="12">ESCALATED</text>
  <text x="715" y="281" class="d" text-anchor="middle" font-size="10.5">veto argued on the record</text>

  <line x1="715" y1="290" x2="715" y2="326" class="flow"/>
  <text x="727" y="312" class="d mono" font-size="10.5">dispute.resolved</text>

  <rect x="620" y="329" width="190" height="42" rx="10" fill="rgba(180,83,9,.09)" stroke="#e3e1d6"/>
  <text x="715" y="355" class="s" font-weight="700" text-anchor="middle" fill="#92400e">ruling: uphold / override</text>

  <!-- converge -->
  <path d="M240 290 C240 350 300 366 352 386" class="flow"/>
  <path d="M470 290 C455 340 440 360 418 386" class="flow"/>
  <path d="M700 371 C660 400 620 404 588 410" class="flow"/>
  <text x="252" y="344" class="d mono" font-size="10.5">treasury.decided</text>

  <!-- terminal -->
  <rect x="290" y="390" width="176" height="56" rx="10" fill="#ffffff" stroke="#047857" stroke-width="1.5" filter="url(#ps)"/>
  <text x="378" y="414" class="st" fill="#047857" text-anchor="middle">APPROVED</text>
  <text x="378" y="432" class="d mono" text-anchor="middle" font-size="10.5">payout.approved</text>

  <rect x="590" y="390" width="176" height="56" rx="10" fill="#ffffff" stroke="#b91c1c" stroke-width="1.5" filter="url(#ps)"/>
  <text x="678" y="414" class="st" fill="#b91c1c" text-anchor="middle">REJECTED</text>
  <text x="678" y="432" class="d mono" text-anchor="middle" font-size="10.5">payout.rejected</text>

  <rect x="352" y="458" width="352" height="22" rx="6" fill="#efede6"/>
  <text x="528" y="473" class="s" text-anchor="middle" font-weight="700" font-size="11">← terminal decision: exactly one per payout →</text>

  <!-- settled -->
  <line x1="378" y1="480" x2="378" y2="536" class="flow"/>
  <text x="392" y="504" class="d mono" font-size="10.5">settlement.requested →</text>
  <text x="392" y="520" class="d mono" font-size="10.5">settlement.confirmed (tx hash)</text>

  <rect x="290" y="540" width="176" height="56" rx="10" fill="#e6f4f0" stroke="#047857" stroke-width="1.5" filter="url(#ps)"/>
  <text x="378" y="564" class="st" fill="#047857" text-anchor="middle">SETTLED</text>
  <text x="378" y="582" class="d mono" text-anchor="middle" font-size="10.5">payout.settled + receipt</text>

  <text x="590" y="562" class="d">rejected payouts end here —</text>
  <text x="590" y="578" class="d">same evidence quality, no money moved</text>

  <line x1="40" y1="606" x2="920" y2="606" stroke="#e3e1d6"/>
  <text x="920" y="628" text-anchor="end" class="d mono">docs/TRUST_MODEL.md · docs/GUARANTEES.md</text>
</svg>
