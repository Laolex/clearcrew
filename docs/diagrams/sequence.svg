<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="'IBM Plex Sans','Segoe UI',-apple-system,sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#e0ddd2"/>
    </pattern>
    <filter id="ps" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#17211c" flood-opacity=".08"/>
    </filter>
    <linearGradient id="tealbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b766b"/><stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="railA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfd4dc"/><stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="railB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfd4dc"/><stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <style>
    .panel { fill:#ffffff; stroke:#e3e1d6; filter:url(#ps); }
    .t   { fill:#17211c; font-size:15px; font-weight:600; }
    .s   { fill:#4d5560; font-size:12px; }
    .d   { fill:#667080; font-size:11px; }
    .mono{ font-family:'IBM Plex Mono','SF Mono',Consolas,monospace; }
    .chip{ font-size:9.5px; font-weight:700; letter-spacing:.07em; }
    .etype { fill:#17211c; font-size:12.5px; font-weight:600; }
    .toff  { fill:#8a93a3; font-size:10.5px; }
    .lbl { fill:#667080; font-size:10px; letter-spacing:.12em; font-weight:700; }
    .green { fill:#047857; } .red { fill:#b91c1c; } .gold { fill:#92400e; }
    .teal  { fill:#0b766b; }
  </style>

  <rect width="960" height="820" fill="#f7f6f2"/>
  <rect width="960" height="820" fill="url(#dots)"/>
  <rect x="0" y="0" width="960" height="3" fill="url(#tealbar)"/>

  <text x="40" y="44" class="t" font-size="13">ClearCrew <tspan fill="#9aa2b1">· system documentation</tspan></text>
  <text x="920" y="44" text-anchor="end" class="teal" font-size="11" font-weight="600">every hop is a hash-chained event</text>
  <line x1="40" y1="58" x2="920" y2="58" stroke="#e3e1d6"/>
  <text x="40" y="96" fill="#17211c" font-size="26" font-weight="700" letter-spacing="-.02">one payout, end to end</text>
  <text x="40" y="118" class="s mono" font-size="11.5">recorded order + real timestamps · runs/events-20260704-200058-settled-n6.jsonl</text>

  <!-- ============ LEFT: clean path ============ -->
  <rect x="40" y="140" width="430" height="640" rx="12" fill="#ffffff" stroke="#e3e1d6" filter="url(#ps)"/>
  <rect x="40" y="140" width="430" height="34" rx="12" fill="rgba(5,150,105,.07)"/>
  <rect x="40" y="162" width="430" height="12" fill="rgba(5,150,105,.07)"/>
  <text x="60" y="162" class="green" font-size="12.5" font-weight="700">CLEAN PATH — $9,800 US→PH · settled on-chain</text>
  <text x="60" y="192" class="d mono">payout 1818e811</text>

  <line x1="86" y1="208" x2="86" y2="742" stroke="url(#railA)" stroke-width="2.5"/>

  <g>
    <circle cx="86" cy="222" r="5.5" fill="#f7f6f2" stroke="#1d4ed8" stroke-width="2.5"/>
    <rect x="106" y="212" width="52" height="17" rx="4" fill="rgba(29,78,216,.08)"/>
    <text x="132" y="224" class="chip" fill="#1d4ed8" text-anchor="middle">INTAKE</text>
    <text x="166" y="224" class="etype mono">intake.classified</text>
    <text x="450" y="224" class="toff mono" text-anchor="end">t+3.9s</text>
    <text x="106" y="242" class="d">low risk, verbatim reason</text>

    <circle cx="86" cy="278" r="5.5" fill="#f7f6f2" stroke="#8a93a3" stroke-width="2.5"/>
    <rect x="106" y="268" width="98" height="17" rx="4" fill="#efede6"/>
    <text x="155" y="280" class="chip" fill="#667080" text-anchor="middle">ORCHESTRATOR</text>
    <text x="212" y="280" class="etype mono" font-size="11.5">compliance.fast_tracked</text>
    <text x="450" y="280" class="toff mono" text-anchor="end">t+4.2s</text>
    <text x="106" y="298" class="d">the skip itself is on the record</text>

    <circle cx="86" cy="334" r="5.5" fill="#f7f6f2" stroke="#7e22ce" stroke-width="2.5"/>
    <rect x="106" y="324" width="70" height="17" rx="4" fill="rgba(126,34,206,.09)"/>
    <text x="141" y="336" class="chip" fill="#7e22ce" text-anchor="middle">TREASURY</text>
    <text x="184" y="336" class="etype mono">treasury.decided</text>
    <text x="450" y="336" class="toff mono" text-anchor="end">t+40.5s</text>
    <text x="106" y="354" class="d">pay_now — total vs reserve headroom</text>

    <circle cx="86" cy="392" r="6.5" fill="#047857" stroke="#047857" stroke-width="2.5"/>
    <rect x="106" y="382" width="98" height="17" rx="4" fill="rgba(5,150,105,.10)"/>
    <text x="155" y="394" class="chip green" text-anchor="middle">ORCHESTRATOR</text>
    <text x="212" y="394" class="etype mono">payout.approved</text>
    <text x="450" y="394" class="toff mono" text-anchor="end">t+75.4s</text>
    <text x="106" y="412" class="green" font-size="11" font-weight="600">terminal decision — exactly one per payout</text>

    <circle cx="86" cy="450" r="5.5" fill="#f7f6f2" stroke="#047857" stroke-width="2.5"/>
    <rect x="106" y="440" width="62" height="17" rx="4" fill="rgba(5,150,105,.10)"/>
    <text x="137" y="452" class="chip green" text-anchor="middle">AUDITOR</text>
    <text x="176" y="452" class="etype mono">audit.explained</text>
    <text x="450" y="452" class="toff mono" text-anchor="end">t+77.7s</text>
    <text x="106" y="470" class="d">plain-language narrative</text>

    <circle cx="86" cy="508" r="5.5" fill="#f7f6f2" stroke="#0b766b" stroke-width="2.5"/>
    <rect x="106" y="498" width="78" height="17" rx="4" fill="rgba(13,148,136,.10)"/>
    <text x="145" y="510" class="chip teal" text-anchor="middle">VERASETTLE</text>
    <text x="192" y="510" class="etype mono">settlement.requested</text>
    <text x="450" y="510" class="toff mono" text-anchor="end">t+104.1s</text>
    <text x="106" y="528" class="d">one single-item batch, idempotent</text>

    <circle cx="86" cy="566" r="6.5" fill="#0b766b" stroke="#0b766b" stroke-width="2.5"/>
    <rect x="106" y="556" width="78" height="17" rx="4" fill="rgba(13,148,136,.10)"/>
    <text x="145" y="568" class="chip teal" text-anchor="middle">VERASETTLE</text>
    <text x="192" y="568" class="etype mono">settlement.confirmed</text>
    <text x="450" y="568" class="toff mono" text-anchor="end">t+119.1s</text>
    <text x="106" y="586" class="teal" font-size="11" font-weight="600">0.98 USDC · Base Sepolia · tx 0x7911…</text>

    <circle cx="86" cy="624" r="6.5" fill="#047857" stroke="#047857" stroke-width="2.5"/>
    <rect x="106" y="614" width="98" height="17" rx="4" fill="rgba(5,150,105,.10)"/>
    <text x="155" y="626" class="chip green" text-anchor="middle">ORCHESTRATOR</text>
    <text x="212" y="626" class="etype mono">payout.settled</text>
    <text x="450" y="626" class="toff mono" text-anchor="end">t+119.1s</text>
    <text x="106" y="644" class="d">decision → money, linked by tx hash</text>

    <circle cx="86" cy="700" r="6" fill="#f7f6f2" stroke="#17211c" stroke-width="2.5"/>
    <rect x="106" y="678" width="344" height="46" rx="8" fill="#efede6"/>
    <text x="120" y="697" class="lbl" fill="#17211c">EVIDENCE PACK</text>
    <text x="120" y="714" class="d mono" font-size="10.5">GET /api/runs/{run}/explain/1818e811</text>
  </g>

  <!-- ============ RIGHT: escalation ============ -->
  <rect x="490" y="140" width="430" height="424" rx="12" fill="#ffffff" stroke="#e3e1d6" filter="url(#ps)"/>
  <rect x="490" y="140" width="430" height="34" rx="12" fill="rgba(185,28,28,.06)"/>
  <rect x="490" y="162" width="430" height="12" fill="rgba(185,28,28,.06)"/>
  <text x="510" y="162" class="red" font-size="12.5" font-weight="700">ESCALATION PATH — $9,800 US→CO · veto argued</text>
  <text x="510" y="192" class="d mono">payout 658cda14 · same run</text>

  <line x1="536" y1="208" x2="536" y2="530" stroke="url(#railB)" stroke-width="2.5"/>

  <g>
    <circle cx="536" cy="222" r="5.5" fill="#f7f6f2" stroke="#1d4ed8" stroke-width="2.5"/>
    <rect x="556" y="212" width="52" height="17" rx="4" fill="rgba(29,78,216,.08)"/>
    <text x="582" y="224" class="chip" fill="#1d4ed8" text-anchor="middle">INTAKE</text>
    <text x="616" y="224" class="etype mono">intake.classified</text>
    <text x="900" y="224" class="toff mono" text-anchor="end">t+3.6s</text>
    <text x="556" y="242" class="d">high risk — P2 pattern</text>

    <circle cx="536" cy="284" r="6" fill="#f7f6f2" stroke="#6d28d9" stroke-width="2.5"/>
    <rect x="556" y="274" width="82" height="17" rx="4" fill="rgba(109,40,217,.09)"/>
    <text x="597" y="286" class="chip" fill="#6d28d9" text-anchor="middle">COMPLIANCE</text>
    <text x="646" y="286" class="etype mono">compliance.reviewed</text>
    <text x="900" y="286" class="toff mono" text-anchor="end">t+29.3s</text>
    <rect x="556" y="296" width="290" height="20" rx="5" fill="rgba(180,83,9,.10)"/>
    <text x="566" y="310" class="gold" font-size="11" font-weight="700">VETO — cites Policy P2, verbatim on record</text>

    <circle cx="536" cy="356" r="6.5" fill="#92400e" stroke="#92400e" stroke-width="2.5"/>
    <rect x="556" y="346" width="80" height="17" rx="4" fill="rgba(180,83,9,.10)"/>
    <text x="596" y="358" class="chip gold" text-anchor="middle">RESOLUTION</text>
    <text x="644" y="358" class="etype mono">dispute.resolved</text>
    <text x="900" y="358" class="toff mono" text-anchor="end">t+75.4s</text>
    <text x="556" y="378" class="gold" font-size="11" font-weight="600">RULING: uphold veto —</text>
    <text x="556" y="394" class="d">“no conditions can cure a P2 violation”</text>

    <circle cx="536" cy="428" r="6.5" fill="#b91c1c" stroke="#b91c1c" stroke-width="2.5"/>
    <rect x="556" y="418" width="98" height="17" rx="4" fill="rgba(185,28,28,.08)"/>
    <text x="605" y="430" class="chip red" text-anchor="middle">ORCHESTRATOR</text>
    <text x="662" y="430" class="etype mono">payout.rejected</text>
    <text x="900" y="430" class="toff mono" text-anchor="end">t+75.4s</text>
    <text x="556" y="448" class="red" font-size="11" font-weight="600">terminal decision</text>

    <circle cx="536" cy="484" r="5.5" fill="#f7f6f2" stroke="#047857" stroke-width="2.5"/>
    <rect x="556" y="474" width="62" height="17" rx="4" fill="rgba(5,150,105,.10)"/>
    <text x="587" y="486" class="chip green" text-anchor="middle">AUDITOR</text>
    <text x="626" y="486" class="etype mono">audit.explained</text>
    <text x="900" y="486" class="toff mono" text-anchor="end">t+78.3s</text>
    <text x="556" y="504" class="d">why, in plain language</text>

    <line x1="536" y1="530" x2="536" y2="540" stroke="#cfd4dc" stroke-width="2.5" stroke-dasharray="3 4"/>
    <text x="556" y="534" class="d" font-weight="600">no settlement events — money that shouldn’t move, didn’t</text>
  </g>

  <!-- what to notice -->
  <rect x="490" y="586" width="430" height="122" rx="12" class="panel"/>
  <text x="510" y="614" class="lbl">WHAT TO NOTICE</text>
  <text x="510" y="640" class="s">· every hop is a hash-chained event with a verbatim reason</text>
  <text x="510" y="662" class="s">· even the shortcut (fast-track) is recorded</text>
  <text x="510" y="684" class="s">· rejection produces the same quality of evidence</text>

  <line x1="40" y1="766" x2="920" y2="766" stroke="#e3e1d6"/>
  <text x="40" y="790" class="d">Replay both, event by event, at clearcrew.verasettle.com</text>
  <text x="920" y="790" text-anchor="end" class="d mono">docs/SEQUENCE.md</text>
</svg>
