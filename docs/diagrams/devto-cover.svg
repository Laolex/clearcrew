<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="'IBM Plex Sans','Segoe UI',-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101a17"/><stop offset="1" stop-color="#17211c"/>
    </linearGradient>
    <linearGradient id="tealbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#ffffff" stroke-opacity=".035"/>
    </pattern>
    <radialGradient id="glow" cx="0.72" cy="0.35" r="0.5">
      <stop offset="0" stop-color="#0d9488" stop-opacity=".22"/>
      <stop offset="1" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .mono { font-family:'IBM Plex Mono','SF Mono',Consolas,monospace; }
    .chip { font-size:9.5px; font-weight:700; letter-spacing:.08em; }
  </style>

  <rect width="1000" height="420" fill="url(#bg)"/>
  <rect width="1000" height="420" fill="url(#grid)"/>
  <rect width="1000" height="420" fill="url(#glow)"/>
  <rect x="0" y="0" width="1000" height="4" fill="url(#tealbar)"/>

  <!-- eyebrow -->
  <text x="56" y="72" class="mono" font-size="12" fill="#2dd4bf" letter-spacing=".12em">CLEARCREW · QWEN CLOUD · AGENT SOCIETY</text>

  <!-- headline -->
  <text x="56" y="132" font-size="40" font-weight="700" fill="#f4f7f5" letter-spacing="-.02">The night my AI agent</text>
  <text x="56" y="180" font-size="40" font-weight="700" fill="#f4f7f5" letter-spacing="-.02">caught another AI agent</text>
  <text x="56" y="228" font-size="40" font-weight="700" fill="#2dd4bf" letter-spacing="-.02">lying</text>

  <text x="56" y="268" font-size="15" fill="#93a29c">An agent society for payout operations — and what the</text>
  <text x="56" y="290" font-size="15" fill="#93a29c">event log taught me that no eval score could.</text>

  <!-- the receipt: the actual caught lie -->
  <rect x="560" y="94" width="392" height="212" rx="10" fill="#0b1512" stroke="#24352f"/>
  <rect x="560" y="94" width="392" height="30" rx="10" fill="#132420"/>
  <rect x="560" y="112" width="392" height="12" fill="#132420"/>
  <text x="578" y="114" class="mono chip" fill="#647a72">RECORDED EVENT CHAIN · PAYOUT 5affb229</text>

  <g class="mono" font-size="10.5">
    <rect x="578" y="140" width="76" height="16" rx="3" fill="rgba(45,212,191,.12)"/>
    <text x="616" y="152" class="chip" fill="#5eead4" text-anchor="middle">COMPLIANCE</text>
    <text x="664" y="152" fill="#cfe0da">clear —</text>
    <text x="578" y="170" fill="#93a29c">“5,000 USD, below the 9,000 threshold”</text>
    <text x="928" y="152" fill="#4d5f58" text-anchor="end">✓</text>

    <rect x="578" y="192" width="66" height="16" rx="3" fill="rgba(248,113,113,.13)"/>
    <text x="611" y="204" class="chip" fill="#fca5a5" text-anchor="middle">TREASURY</text>
    <text x="654" y="204" fill="#cfe0da">reject —</text>
    <text x="578" y="222" fill="#fca5a5">“P2 violation: amount &gt;= 9000 USD”</text>
    <text x="928" y="204" fill="#f87171" text-anchor="end">✗</text>

    <rect x="578" y="244" width="58" height="16" rx="3" fill="rgba(45,212,191,.12)"/>
    <text x="607" y="256" class="chip" fill="#5eead4" text-anchor="middle">AUDITOR</text>
    <text x="646" y="256" fill="#cfe0da">flags it, unprompted:</text>
    <text x="578" y="276" fill="#5eead4">“an incorrect determination”</text>
  </g>

  <text x="578" y="296" class="mono" font-size="9.5" fill="#4d5f58">…on a $5,000 payout. hash-chained, replayable.</text>

  <!-- footer -->
  <line x1="56" y1="336" x2="944" y2="336" stroke="#24352f"/>
  <text x="56" y="366" class="mono" font-size="11.5" fill="#647a72">society 100% · monolith 89% — same batch, same policy, same models</text>
  <text x="944" y="366" class="mono" font-size="11.5" fill="#647a72" text-anchor="end">clearcrew.verasettle.com</text>
</svg>
