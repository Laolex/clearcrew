<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="'SF Pro Display','Inter','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <style>
      @keyframes slideIn { 0% { opacity: 0; transform: translateX(-20px); } 100% { opacity: 1; transform: translateX(0); } }
      .title { animation: slideIn 0.6s ease-out; }
      .stat-line { animation: slideIn 0.6s ease-out 0.3s both; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="420" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="420" fill="url(#accent)"/>

  <!-- Content -->
  <text x="60" y="80" fill="#6366f1" font-size="14" font-weight="700" letter-spacing="3">CLEARCREW</text>

  <text class="title" x="60" y="140" fill="#fff" font-size="36" font-weight="800" letter-spacing="-0.5">
    Agent Society over Opaque Monolith
  </text>
  <text class="title" x="60" y="180" fill="#94a3b8" font-size="18">
    Five specialist Qwen agents. Hash-chained decisions. Real on-chain settlement.
  </text>

  <!-- Stats row -->
  <g class="stat-line">
    <rect x="60" y="220" width="12" height="12" rx="3" fill="#10b981"/>
    <text x="82" y="232" fill="#e2e8f0" font-size="15" font-weight="600">100% accuracy</text>
    <text x="210" y="232" fill="#64748b" font-size="13">at n=36</text>
  </g>

  <g class="stat-line">
    <rect x="60" y="252" width="12" height="12" rx="3" fill="#6366f1"/>
    <text x="82" y="264" fill="#e2e8f0" font-size="15" font-weight="600">5 specialist agents</text>
    <text x="220" y="264" fill="#64748b" font-size="13">Intake · Compliance · Treasury · Resolution · Auditor</text>
  </g>

  <g class="stat-line">
    <rect x="60" y="284" width="12" height="12" rx="3" fill="#f59e0b"/>
    <text x="82" y="296" fill="#e2e8f0" font-size="15" font-weight="600">Blind spots die</text>
    <text x="200" y="296" fill="#64748b" font-size="13">Every error attributed to a specific agent, not a black box</text>
  </g>

  <g class="stat-line">
    <rect x="60" y="316" width="12" height="12" rx="3" fill="#22d3ee"/>
    <text x="82" y="328" fill="#e2e8f0" font-size="15" font-weight="600">Real USDC on Base Sepolia</text>
    <text x="300" y="328" fill="#64748b" font-size="13">Not a simulation — real testnet settlement</text>
  </g>

  <!-- Right side: mini bench comparison -->
  <g transform="translate(560, 90)">
    <rect x="0" y="0" width="380" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="380" height="44" rx="12" fill="#0f172a"/>
    <text x="190" y="28" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">n=36 BENCHMARK</text>

    <!-- Society row -->
    <rect x="20" y="65" width="160" height="36" rx="8" fill="#064e3b" opacity="0.3"/>
    <text x="100" y="88" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="600">100%</text>
    <text x="180" y="88" fill="#e2e8f0" font-size="14">Society</text>
    <text x="300" y="88" text-anchor="middle" fill="#64748b" font-size="11">✓ auditable</text>

    <!-- Monolith row -->
    <rect x="20" y="115" width="160" height="36" rx="8" fill="#450a0a" opacity="0.3"/>
    <rect x="20" y="115" width="142" height="36" rx="8" fill="#7f1d1d" opacity="0.4"/>
    <text x="100" y="138" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="600">89%</text>
    <text x="180" y="138" fill="#e2e8f0" font-size="14">Monolith</text>
    <text x="300" y="138" text-anchor="middle" fill="#64748b" font-size="11">✗ black box</text>

    <!-- Gap arrow -->
    <path d="M 100 108 L 100 108" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>

    <!-- Detail bullets -->
    <circle cx="30" cy="185" r="3" fill="#f43f5e"/>
    <text x="42" y="189" fill="#94a3b8" font-size="11">Monolith approved $30k past the reserve floor</text>
    <circle cx="30" cy="210" r="3" fill="#f43f5e"/>
    <text x="42" y="214" fill="#94a3b8" font-size="11">Monolith rejected 2 clean $5k payouts</text>
    <circle cx="30" cy="235" r="3" fill="#10b981"/>
    <text x="42" y="239" fill="#94a3b8" font-size="11">Society got all 36 right with verified trails</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="390" width="1000" height="30" fill="#0f172a"/>
  <text x="500" y="410" text-anchor="middle" fill="#334155" font-size="12">clearcrew.verasettle.com · Hash-chain verified · MIT</text>
</svg>
