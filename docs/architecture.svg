<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'SF Mono','Consolas','Monaco','Courier New',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box-intake" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="box-compliance" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="box-treasury" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="box-resolution" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="box-auditor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="box-log" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="box-settlement" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="box-replay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse-agent {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      @keyframes flow-arrow {
        0% { stroke-dashoffset: 24; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes slide-event {
        0% { transform: translateY(-30px); opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 1; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes glow-pulse {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(99,102,241,0.3)); }
        50% { filter: drop-shadow(0 0 8px rgba(99,102,241,0.6)); }
      }
      .agent-trigger { animation: pulse-agent 2s ease-in-out infinite; }
      .agent-trigger:nth-child(2) { animation-delay: 0.4s; }
      .agent-trigger:nth-child(3) { animation-delay: 0.8s; }
      .agent-trigger:nth-child(4) { animation-delay: 1.2s; }
      .agent-trigger:nth-child(5) { animation-delay: 1.6s; }
      .flow-line { stroke-dasharray: 8 4; animation: flow-arrow 1s linear infinite; }
      .event-block { animation: slide-event 3s ease-out infinite; }
      .event-block:nth-child(2) { animation-delay: 0.6s; }
      .event-block:nth-child(3) { animation-delay: 1.2s; }
      .event-block:nth-child(4) { animation-delay: 1.8s; }
      .hash-glow { animation: glow-pulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold">ClearCrew Architecture</text>
  <line x1="280" y1="48" x2="680" y2="48" stroke="#334155" stroke-width="1"/>

  <!-- Section label: Qwen Cloud -->
  <text x="480" y="75" text-anchor="middle" fill="#64748b" font-size="11" letter-spacing="2" text-transform="uppercase">Qwen Cloud — DashScope</text>
  <text x="480" y="89" text-anchor="middle" fill="#475569" font-size="10">qwen3.7-max (reasoning) · qwen3.7-plus (fast)</text>

  <!-- Agent boxes row -->
  <!-- Intake -->
  <g class="agent-trigger">
    <rect x="60" y="108" width="140" height="56" rx="8" fill="url(#box-intake)" filter="url(#glow)"/>
    <text x="130" y="131" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Intake</text>
    <text x="130" y="150" text-anchor="middle" fill="#c7d2fe" font-size="10">risk triage</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="136" x2="235" y2="136" stroke="#6366f1" stroke-width="1.5" class="flow-line"/>

  <!-- Compliance -->
  <g class="agent-trigger">
    <rect x="240" y="108" width="140" height="56" rx="8" fill="url(#box-compliance)"/>
    <text x="310" y="131" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Compliance</text>
    <text x="310" y="150" text-anchor="middle" fill="#fef3c7" font-size="10">veto power</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="380" y1="136" x2="415" y2="136" stroke="#f59e0b" stroke-width="1.5" class="flow-line"/>

  <!-- Treasury -->
  <g class="agent-trigger">
    <rect x="420" y="108" width="140" height="56" rx="8" fill="url(#box-treasury)"/>
    <text x="490" y="131" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Treasury</text>
    <text x="490" y="150" text-anchor="middle" fill="#a7f3d0" font-size="10">funding order</text>
  </g>

  <!-- Arrow 3→4 (dispute path) -->
  <line x1="490" y1="164" x2="490" y2="195" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- Resolution (below Treasury) -->
  <g class="agent-trigger">
    <rect x="420" y="200" width="140" height="48" rx="8" fill="url(#box-resolution)"/>
    <text x="490" y="223" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Resolution</text>
    <text x="490" y="238" text-anchor="middle" fill="#fecdd3" font-size="9">dispute mediator</text>
  </g>

  <!-- Auditor (far right, standalone) -->
  <g class="agent-trigger">
    <rect x="760" y="108" width="140" height="56" rx="8" fill="url(#box-auditor)"/>
    <text x="830" y="131" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Auditor</text>
    <text x="830" y="150" text-anchor="middle" fill="#ddd6fe" font-size="10">explanation</text>
  </g>

  <!-- Agent decisions flowing down to event log -->
  <path d="M130 164 L130 280" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <path d="M310 164 L310 280" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <path d="M490 248 L490 280" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <path d="M830 164 L830 280" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>

  <!-- Event log section -->
  <rect x="60" y="290" width="840" height="120" rx="10" fill="url(#box-log)" stroke="#334155" stroke-width="1"/>

  <!-- Event blocks (animated) -->
  <g class="event-block">
    <rect x="85" y="310" width="160" height="32" rx="4" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
    <text x="165" y="329" text-anchor="middle" fill="#a5b4fc" font-size="9">intake.classified</text>
    <rect x="85" y="346" width="160" height="20" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="165" y="360" text-anchor="middle" fill="#64748b" font-size="8">prev_hash: 0x0000…</text>
  </g>

  <g class="event-block">
    <rect x="270" y="310" width="160" height="32" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="350" y="329" text-anchor="middle" fill="#fcd34d" font-size="9">compliance.reviewed</text>
    <rect x="270" y="346" width="160" height="20" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="350" y="360" text-anchor="middle" fill="#64748b" font-size="8">prev_hash: a1b2c3…</text>
  </g>

  <g class="event-block">
    <rect x="455" y="310" width="160" height="32" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <text x="535" y="329" text-anchor="middle" fill="#6ee7b7" font-size="9">treasury.decided</text>
    <rect x="455" y="346" width="160" height="20" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="535" y="360" text-anchor="middle" fill="#64748b" font-size="8">prev_hash: d4e5f6…</text>
  </g>

  <g class="event-block">
    <rect x="640" y="310" width="160" height="32" rx="4" fill="#1e293b" stroke="#f43f5e" stroke-width="1"/>
    <text x="720" y="329" text-anchor="middle" fill="#fda4af" font-size="9">payout.approved</text>
    <rect x="640" y="346" width="160" height="20" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="720" y="360" text-anchor="middle" fill="#64748b" font-size="8">prev_hash: g7h8i9…</text>
  </g>

  <!-- Hash chain line -->
  <g class="hash-glow">
    <text x="480" y="395" text-anchor="middle" fill="#6366f1" font-size="10">┄ SHA-256 hash chain ┄</text>
  </g>

  <!-- Arrow: event log → downstream services -->
  <line x1="480" y1="410" x2="480" y2="445" stroke="#475569" stroke-width="1.5"/>
  <line x1="240" y1="445" x2="720" y2="445" stroke="#475569" stroke-width="1.5"/>
  <line x1="240" y1="445" x2="240" y2="470" stroke="#475569" stroke-width="1.5"/>
  <line x1="720" y1="445" x2="720" y2="470" stroke="#475569" stroke-width="1.5"/>

  <!-- Verasettle Settlement Rail -->
  <g>
    <rect x="540" y="472" width="280" height="56" rx="8" fill="url(#box-settlement)"/>
    <text x="680" y="496" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Verasettle Settlement Rail</text>
    <text x="680" y="514" text-anchor="middle" fill="#cffafe" font-size="10">USDC on Base Sepolia · ~24s</text>
  </g>

  <!-- Replay Time Machine + MCP -->
  <g>
    <rect x="140" y="472" width="280" height="56" rx="8" fill="url(#box-replay)"/>
    <text x="280" y="496" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Replay Time Machine + MCP</text>
    <text x="280" y="514" text-anchor="middle" fill="#bfdbfe" font-size="10">read-only audit · no API key needed</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="555" x2="900" y2="555" stroke="#1e293b" stroke-width="1"/>
  <text x="480" y="580" text-anchor="middle" fill="#334155" font-size="9">An agent's judgment, the final verdict, and the real on-chain settlement — every event committing to the hash of the one before it.</text>
  <text x="480" y="598" text-anchor="middle" fill="#1e293b" font-size="9">Decisions never vanish. Errors are attributable. History is replayable.</text>
</svg>
