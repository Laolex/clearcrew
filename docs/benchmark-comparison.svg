<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'SF Mono','Consolas','Monaco','Courier New',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>
      @keyframes barGrow { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      .bar-ani { animation: barGrow 1s ease-out both; transform-origin: left; }
      .bar-ani:nth-child(1) { animation-delay: 0.2s; }
      .bar-ani:nth-child(2) { animation-delay: 0.4s; }
      .bar-ani:nth-child(3) { animation-delay: 0.6s; }
      .bar-ani:nth-child(4) { animation-delay: 0.8s; }
      .label-fade { animation: fadeIn 0.4s ease-out both; }
      .label-fade:nth-child(1) { animation-delay: 0.2s; }
      .label-fade:nth-child(2) { animation-delay: 0.4s; }
      .label-fade:nth-child(3) { animation-delay: 0.6s; }
      .label-fade:nth-child(4) { animation-delay: 0.8s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold">Society vs Monolith — Headline Benchmark</text>
  <text x="400" y="68" text-anchor="middle" fill="#64748b" font-size="12">Same batch · same policy · same models · n=36</text>

  <!-- Table header -->
  <line x1="60" y1="95" x2="740" y2="95" stroke="#334155" stroke-width="1"/>
  <text x="160" y="120" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">ACCURACY</text>
  <text x="320" y="120" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">TOKENS</text>
  <text x="460" y="120" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">TIME</text>
  <text x="580" y="120" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">AUDITABLE</text>
  <line x1="60" y1="130" x2="740" y2="130" stroke="#1e293b" stroke-width="1"/>

  <!-- Society row -->
  <g filter="url(#shadow)">
    <rect x="60" y="145" width="680" height="60" rx="8" fill="#0f172a" stroke="#064e3b" stroke-width="1"/>
  </g>
  <rect class="bar-ani" x="60" y="145" width="680" height="60" rx="8" fill="#064e3b" opacity="0.15"/>
  <g class="label-fade">
    <text x="80" y="182" fill="#6ee7b7" font-size="15" font-weight="bold">Society</text>
    <text x="160" y="182" text-anchor="middle" fill="#10b981" font-size="22" font-weight="800">100%</text>
    <text x="320" y="182" text-anchor="middle" fill="#94a3b8" font-size="14">76,113</text>
    <text x="460" y="182" text-anchor="middle" fill="#94a3b8" font-size="14">323s</text>
    <text x="580" y="182" text-anchor="middle" fill="#10b981" font-size="16">✓</text>
  </g>

  <!-- Monolith row -->
  <g filter="url(#shadow)">
    <rect x="60" y="220" width="680" height="60" rx="8" fill="#0f172a" stroke="#7f1d1d" stroke-width="1"/>
  </g>
  <rect class="bar-ani" x="60" y="220" width="605" height="60" rx="8" fill="#7f1d1d" opacity="0.15"/>
  <g class="label-fade">
    <text x="80" y="257" fill="#fca5a5" font-size="15" font-weight="bold">Monolith</text>
    <text x="160" y="257" text-anchor="middle" fill="#f43f5e" font-size="22" font-weight="800">89%</text>
    <text x="320" y="257" text-anchor="middle" fill="#94a3b8" font-size="14">12,068</text>
    <text x="460" y="257" text-anchor="middle" fill="#94a3b8" font-size="14">150s</text>
    <text x="580" y="257" text-anchor="middle" fill="#f43f5e" font-size="16">✗</text>
  </g>

  <!-- n=12 rows -->
  <text x="80" y="315" fill="#475569" font-size="12">n=12 run for comparison:</text>

  <g filter="url(#shadow)">
    <rect x="80" y="335" width="300" height="40" rx="6" fill="#0f172a" stroke="#064e3b" stroke-width="0.5"/>
    <text x="100" y="360" fill="#6ee7b7" font-size="13" font-weight="bold">Society n=12</text>
    <text x="220" y="360" text-anchor="middle" fill="#10b981" font-size="16" font-weight="700">100%</text>
    <text x="310" y="360" text-anchor="middle" fill="#64748b" font-size="11">21,992 tok</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="335" width="300" height="40" rx="6" fill="#0f172a" stroke="#7f1d1d" stroke-width="0.5"/>
    <text x="440" y="360" fill="#fca5a5" font-size="13" font-weight="bold">Monolith n=12</text>
    <text x="560" y="360" text-anchor="middle" fill="#10b981" font-size="16" font-weight="700">100%</text>
    <text x="650" y="360" text-anchor="middle" fill="#64748b" font-size="11">3,894 tok</text>
  </g>

  <!-- Verdict box -->
  <g filter="url(#shadow)">
    <rect x="60" y="400" width="680" height="70" rx="8" fill="#0f172a" stroke="#6366f1" stroke-width="1"/>
    <text x="400" y="428" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="600">THE VERDICT</text>
    <text x="400" y="452" text-anchor="middle" fill="#64748b" font-size="12">At n=36 the monolith fails silently in both directions. The society gets all 36 right —</text>
    <text x="400" y="468" text-anchor="middle" fill="#64748b" font-size="12">every decision with a replayable, hash-verified event trail.</text>
  </g>
</svg>
